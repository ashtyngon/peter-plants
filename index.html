:root{

  --over-ink:#b91c1c; --over-bg:#fee2e2; --over-edge:#ef4444;
  --good-ink:#166534; --good-bg:#dcfce7; --good-edge:#22c55e;
  --none-ink:#475569; --none-bg:#e2e8f0; --none-edge:#94a3b8;
  --shadow:0 1px 2px rgba(23,46,30,.06),0 6px 18px rgba(23,46,30,.07);
}
@media (prefers-color-scheme: dark){

    --bg:#0f1512; --card:#1a221c; --ink:#e7efe9; --muted:#9db3a4;
    --green:#5bbd85; --green-soft:#1e3328; --line:#2a362d;

    --over-ink:#fca5a5; --over-bg:#3d1515; --over-edge:#dc2626;
    --good-ink:#86efac; --good-bg:#132e1c; --good-edge:#16a34a;
    --none-ink:#cbd5e1; --none-bg:#26303b; --none-edge:#64748b;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:70px}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 14px 0}
.h-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;max-width:1100px;margin:0 auto}
h1{font-size:21px;margin:0;letter-spacing:-.02em}
.h-right{display:flex;align-items:baseline;gap:10px;font-size:12.5px;color:var(--muted);white-space:nowrap}
#syncDot{display:inline-flex;align-items:center;gap:5px}
#syncDot i{width:8px;height:8px;border-radius:99px;background:var(--none-edge);display:inline-block}
#syncDot.ok i{background:var(--good-edge)} #syncDot.busy i{background:var(--due-edge)} #syncDot.off i{background:var(--over-edge)}
.summary{max-width:1100px;margin:5px auto 0;font-size:13.5px;color:var(--muted)}
.summary b{color:var(--ink)}
.progress{max-width:1100px;margin:7px auto 9px;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
.progress i{display:block;height:100%;width:0;background:var(--green);border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.chips{display:flex;gap:7px;max-width:1100px;margin:0 auto;padding:2px 0 10px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:99px;cursor:pointer;transition:.15s}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
main{max-width:1100px;margin:0 auto;padding:12px 14px}
.group-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 2px 9px}
.group-title{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.group-title .count{font-size:11.5px;font-weight:700;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:2px 8px}
.bulk{border:1px solid var(--green);background:var(--green-soft);color:var(--green);font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:99px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px}
@media(max-width:420px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);display:flex;flex-direction:column;position:relative}
.card.overdue{border-color:color-mix(in srgb,var(--over-edge) 60%,var(--line))}
.card.due-now{border-color:color-mix(in srgb,var(--due-edge) 55%,var(--line))}
.ph{position:relative;cursor:pointer}
.ph img{display:block;width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--line)}
.status{position:absolute;left:7px;bottom:7px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;backdrop-filter:blur(4px)}
.status.due{background:var(--due-bg);color:var(--due-ink);box-shadow:inset 0 0 0 1.5px var(--due-edge)}
.status.over{background:var(--over-bg);color:var(--over-ink);box-shadow:inset 0 0 0 1.5px var(--over-edge)}
.status.good{background:var(--good-bg);color:var(--good-ink);box-shadow:inset 0 0 0 1.5px var(--good-edge)}
.status.none{background:var(--none-bg);color:var(--none-ink);box-shadow:inset 0 0 0 1.5px var(--none-edge)}

.body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1}

.sched{font-size:11px;color:var(--muted);line-height:1.35}

.water:active{transform:scale(.96)}

.drop{position:absolute;pointer-events:none;font-size:12px;animation:fall .8s ease-in forwards}
@keyframes fall{from{transform:translateY(-6px);opacity:1}to{transform:translateY(34px);opacity:0}}
.empty{color:var(--muted);text-align:center;padding:40px 10px;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(10,18,12,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}

.note{font-size:13.5px;line-height:1.5;color:var(--muted)}

footer{max-width:1100px;margin:24px auto 0;padding:0 16px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
</style>

function load(){
  try{

  }catch(e){}

    const v1 = JSON.parse(localStorage.getItem("peter-plants-v1"));
    if(v1 && v1.log) return {log:v1.log, void:{}};
  }catch(e){}
  return {log:{}, void:{}};
}
function save(){ localStorage.setItem(KEY, JSON.stringify(store)) }
function mergeMaps(a,b){
  const out = {};
  for(const k of new Set([...Object.keys(a||{}), ...Object.keys(b||{})]))
    out[k] = [...new Set([...(a[k]||[]), ...(b[k]||[])])].sort((x,y)=>x-y);
  return out;
}
function mergeStores(x,y){ return {log:mergeMaps(x.log,y.log), void:mergeMaps(x.void,y.void)} }
function effLog(id){
  const v = new Set(store.void[id]||[]);
  return (store.log[id]||[]).filter(t=>!v.has(t));
}
function sod(t){ const d = new Date(t); d.setHours(0,0,0,0); return d.getTime() }
function ymd(t){ const d = new Date(t); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0") }
function lastWatered(id){ const a = effLog(id); return a.length ? a[a.length-1] : null }
function daysSince(id){ const lw = lastWatered(id); return lw==null ? null : Math.round((sod(Date.now())-sod(lw))/86400000) }
function verb(p){ return p.type==="check" ? "Checked" : "Watered" }
function stat(p){
  if(p.type==="none") return {k:"none", label:"😴 Leave alone", rank:4};
  const ds = daysSince(p.id);
  if(ds===null) return {k:"none", label:"No record yet", rank:1};
  if(ds===0) return {k:"good", label:verb(p)+" today", rank:3};
  const late = ds - p.interval;
  if(late>0) return {k:"over", label:`Overdue ${late}d`, rank:0};
  if(late===0) return {k:"due", label: p.type==="check" ? "Check today" : "Water today", rank:0};
  const next = new Date(sod(lastWatered(p.id)) + p.interval*86400000);
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const when = (-late)===1 ? "tmrw" : dayNames[next.getDay()];
  return {k:"good", label:`Good · ${when}`, rank:2};
}
function agoLabel(id){
  const ds = daysSince(id);
  if(ds===null) return "never logged";
  if(ds===0) return "today"; if(ds===1) return "yesterday";
  return ds + " days ago";
}
function schedLabel(p){
  if(p.type==="none") return "no watering";
  const base = p.interval===1 ? "every day" : p.interval===2 ? "every 2 days" : "once a week";
  return p.type==="check" ? base+" · check first" : base;
}

/* ——— sync ——— */
function setSync(state, txt){
  const el = document.getElementById("syncDot");
  el.className = state; document.getElementById("syncTxt").textContent = txt;
}
async function sync(push){
  if(syncing) return; syncing = true;
  setSync("busy","syncing");
  try{
    const r = await fetch(REMOTE, {headers:{"Accept":"application/json"}, cache:"no-store"});
    let remote = {log:{}, void:{}};
    if(r.ok){ const j = await r.json(); if(j && (j.log||j.void)) remote = {log:j.log||{}, void:j.void||{}}; }
    const merged = mergeStores(store, remote);
    const changedLocal = JSON.stringify(merged)!==JSON.stringify(store);
    const needPush = push || JSON.stringify(merged)!==JSON.stringify({log:remote.log,void:remote.void});
    store = merged; save();
    if(needPush){
      await fetch(REMOTE, {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(store)});
    }
    lastSyncOk = Date.now();
    setSync("ok","synced");
    if(changedLocal) render();
  }catch(e){
    setSync("off","offline — saved here");
  }finally{ syncing = false; }
}
function queueSync(){ clearTimeout(syncTimer); syncTimer = setTimeout(()=>sync(true), 400); }

/* ——— actions ——— */
function water(id, ev){
  const p = PLANTS.find(x=>x.id===id);
  (store.log[id] = store.log[id] || []).push(Date.now());
  save(); lastAction = {id, ts: store.log[id][store.log[id].length-1]};
  if(ev){ const btn = ev.currentTarget;
    for(let i=0;i<5;i++){ const s=document.createElement("span"); s.className="drop"; s.textContent="💧";
      s.style.left=(15+Math.random()*70)+"%"; s.style.top="-4px"; s.style.animationDelay=(Math.random()*.2)+"s";
      btn.appendChild(s); setTimeout(()=>s.remove(),1100); } }
  setTimeout(render, ev?300:0);
  toast(`${p.name} — ${verb(p).toLowerCase()} ✓`, true);
  queueSync();
}
function waterAllDue(){
  const due = PLANTS.filter(p=>visible(p) && stat(p).rank===0 && p.type!=="check");
  const now = Date.now();
  due.forEach(p=>{ (store.log[p.id] = store.log[p.id]||[]).push(now) });
  lastAction = null; save(); render(); queueSync();
  toast(`${due.length} plants marked watered ✓ (check-first pots left alone)`, false);
}
function undo(){
  if(!lastAction) return;
  (store.void[lastAction.id] = store.void[lastAction.id] || []).push(lastAction.ts);
  lastAction = null; save(); render(); queueSync(); toast("Undone", false);
}
function setLast(id, val){
  if(!val) return;
  const [y,m,d] = val.split("-").map(Number);
  const t = new Date(y, m-1, d, 12, 0, 0).getTime();
  const cur = lastWatered(id);
  if(cur!=null) (store.void[id] = store.void[id]||[]).push(cur);
  (store.log[id] = store.log[id]||[]).push(t);
  save(); render(); queueSync(); toast("Date updated ✓", false);
}
function toast(msg, withUndo){
  const t = document.getElementById("toast");
  t.innerHTML = msg + (withUndo? ' <button onclick="undo()">Undo</button>':'');
  t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 5000);
}

/* ——— render ——— */
function visible(p){
  if(filter==="due") return stat(p).rank<=1 && p.type!=="none";
  if(ROOMS[filter]) return p.room===filter;
  return true;
}
function card(p){
  const s = stat(p);
  const wateredToday = p.type!=="none" && daysSince(p.id)===0;
  const btn = p.type==="none"
    ? `<button class="water" disabled>Nothing to do</button>`
    : `<button class="water ${wateredToday?'done':''}" onclick="water('${p.id}', event)">
        ${wateredToday ? verb(p)+" ✓" : "💧 "+(p.type==="check"?"Checked":"Watered")}</button>`;
  return `<div class="card ${s.k==='over'?'overdue': s.rank===0?'due-now':''}">
    <div class="ph" onclick="openSheet('${p.id}')">
      <img src="assets/img/plants/${p.id}.jpg" alt="${p.name}" loading="lazy">
      <span class="room-tag">${ROOMS[p.room].split(" ")[0]}</span>
      <span class="status ${s.k}">${s.k==='due'?'💧 ':s.k==='over'?'🥀 ':s.k==='good'?'✓ ':''}${s.label}</span>
    </div>
    <div class="body">
      <div class="name">${p.name}</div>
      <div class="sched"><b>${schedLabel(p)}</b>${p.type==="none"?"":" · "+agoLabel(p.id)}</div>
      <div class="actions">${btn}<button class="mini" onclick="openSheet('${p.id}')">ℹ︎</button></div>
    </div>
  </div>`;
}
function render(){
  const now = new Date();
  document.getElementById("todayLabel").textContent =
    now.toLocaleDateString(undefined,{weekday:"short", month:"short", day:"numeric"});
  const act = PLANTS.filter(p=>p.type!=="none");
  const due = act.filter(p=>stat(p).rank===0);
  const fresh = act.filter(p=>stat(p).rank===1);
  const doneToday = act.filter(p=>daysSince(p.id)===0);
  let sum;
  if(due.length) sum = `<b>${due.length}</b> need${due.length>1?"":"s"} attention · <b>${doneToday.length}</b> done today`;
  else if(fresh.length) sum = `<b>${fresh.length}</b> waiting for a first log — tap as you water`;
  else sum = `All ${act.length} plants happy — <b>${doneToday.length}</b> done today 🎉`;
  document.getElementById("summary").innerHTML = sum;
  const total = due.length + fresh.length + doneToday.length;
  document.getElementById("bar").style.width = total? Math.round(100*doneToday.length/total)+"%" : "100%";

  const chips = [["all","All"],["due","💧 Needs water"],...Object.entries(ROOMS)];
  document.getElementById("chips").innerHTML = chips.map(([k,l])=>
    `<button class="chip ${filter===k?'on':''}" onclick="filter='${k}';render()">${l}</button>`).join("");

  const list = PLANTS.filter(visible);
  const roomOrder = Object.keys(ROOMS);
  const bySort = (a,b)=> roomOrder.indexOf(a.room)-roomOrder.indexOf(b.room) || a.name.localeCompare(b.name);
  const needs = list.filter(p=>stat(p).rank===0).sort(bySort);
  const noRec = list.filter(p=>stat(p).rank===1).sort(bySort);
  const good  = list.filter(p=>stat(p).rank>=2).sort((a,b)=>stat(a).rank-stat(b).rank || bySort(a,b));
  let html = "";
  if(needs.length){
    const bulkable = needs.filter(p=>p.type!=="check").length;
    html += `<div class="group-head"><div class="group-title">💧 Water now <span class="count">${needs.length}</span></div>
      ${bulkable>1?`<button class="bulk" onclick="waterAllDue()">✓ Mark all ${bulkable} watered</button>`:""}</div>
      <div class="grid">${needs.map(card).join("")}</div>`;
  }
  if(noRec.length) html += `<div class="group-head"><div class="group-title">🌱 No record yet <span class="count">${noRec.length}</span></div></div><div class="grid">${noRec.map(card).join("")}</div>`;
  if(good.length)  html += `<div class="group-head"><div class="group-title">✅ All good <span class="count">${good.length}</span></div></div><div class="grid">${good.map(card).join("")}</div>`;
  if(!html) html = `<div class="empty">Nothing here with this filter.</div>`;
  document.getElementById("main").innerHTML = html;
}
function openSheet(id){
  const p = PLANTS.find(x=>x.id===id);
  const lw = lastWatered(id);
  const hist = effLog(id).slice(-5).reverse().map(t=>
    "• " + new Date(t).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}) +
    ", " + new Date(t).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})).join("<br>") || "—";
  const dateRow = p.type==="none" ? "" : `
      <div class="row"><label>Last ${verb(p).toLowerCase()}</label>
        <input type="date" value="${lw? ymd(lw):""}" max="${ymd(Date.now())}" onchange="setLast('${p.id}', this.value)"></div>
      <div class="row" style="align-items:flex-start"><label>Recent</label><div class="hist">${hist}</div></div>`;
  document.getElementById("sheet").innerHTML = `
    <img class="big" src="assets/img/plants/${p.id}.jpg" alt="${p.name}">
    <div class="inner">
      <h2>${p.name}</h2>
      <div class="aka">${p.aka||""} · ${ROOMS[p.room]} · ${schedLabel(p)}</div>
      <div class="quote">“${p.quote}”<small>— Peter’s walkthrough, July 5${p.umbrella? " (said about this whole group)":""}</small></div>
      ${p.note? `<div class="note">${p.note}</div>`:""}
      ${dateRow}
    </div>
    <button class="close" onclick="closeSheet()">Close</button>`;
  document.getElementById("overlay").classList.add("show");
  document.body.style.overflow="hidden";
}
function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow="";
}
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") closeSheet() });
window.addEventListener("keydown", e=>{ if(e.key==="Escape") closeSheet() });

render();
sync(false);
setInterval(()=>{ if(document.visibilityState==="visible") sync(false) }, 20000);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") sync(false) });
window.addEventListener("focus", ()=>sync(false));
setInterval(render, 10*60*1000);
</script>
</body>
</html>
